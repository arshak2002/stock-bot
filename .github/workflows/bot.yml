name: Momentum Rotation Daily Check

# Runs every weekday after the NSE close and pings Telegram only on the
# monthly rebalance day. Free on GitHub Actions — no credit card required.
on:
  schedule:
    - cron: '30 10 * * 1-5'   # 16:00 IST (10:30 UTC), Mon–Fri, after market close
  workflow_dispatch:           # manual "Run workflow" button for testing

jobs:
  momentum-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install yfinance pandas numpy pyyaml

      - name: Run momentum check (Telegram alert only on rebalance day)
        run: python quantbot.py live
        env:
          TZ: Asia/Kolkata
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
