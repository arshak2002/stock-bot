# Copy to config.yaml for LOCAL runs (config.yaml is gitignored — never committed).
# In the cloud (GitHub Actions), set these as repo Secrets instead:
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
telegram:
  enabled: true
  bot_token: "YOUR_BOT_TOKEN_HERE"   # from @BotFather
  chat_id: "YOUR_CHAT_ID_HERE"       # your numeric chat id
