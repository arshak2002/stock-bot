# ═══════════════════════════════════════════════
#  config.yaml — V5.0 Central Configuration
#  All magic numbers in one place. Hot-reloaded.
# ═══════════════════════════════════════════════

# ── Account ──
account:
  capital: 100000          # ₹ starting capital
  risk_per_trade_pct: 1.0  # % of capital risked per trade
  max_risk_pct: 1.5        # hard cap on risk %
  max_position_pct: 5.0    # max single position as % of capital
  max_kelly_fraction: 0.25 # cap Kelly to prevent overbetting
  cold_start_kelly_floor: 0.3  # fraction of base_qty used when trade history < 5 trades

# ── Diagnostics ──
diag_mode: true   # prints [DIAG] gate-level block reasons — set false in production

# ── Session ──
session:
  safe_open: "09:20"
  safe_close: "15:15"
  no_reversal_before: "09:35"
  max_trades_per_day: 6    # one per stock, max 6 stocks per day
  poll_interval_sec: 5

# ── Scoring ──
scoring:
  # Time-of-day adaptive thresholds (V6.0 — max score is 9.5)
  min_score_orb_window: 5.5      # 9:15–10:00 AM ORB window
  min_score_morning: 5.0         # 10:01–12:00
  min_score_afternoon: 4.5       # 12:00–3:15
  grade_a_plus: 8.0
  grade_a: 6.5

  min_score: 5.0           # fallback floor
  move_threshold_pct: 0.5  # 0.5% move from open required for reversal (was 0.4)
  ema9_pullback_pct: 0.5   # widened: within 0.5% of EMA9 qualifies as pullback (was 0.3)
  vwap_bounce_dist_pct: 0.5   # widened: within 0.5% of VWAP triggers bounce strategy (was 0.25)
  vwap_proximity_pct: 1.5        # widened: within 1.5% of VWAP counts
  cpr_proximity_pct: 0.75        # was 0.3 — this was the main culprit
  rsi_oversold: 45         # relaxed RSI bands
  rsi_overbought: 55
  volume_spike_ratio: 1.2  # lowered: 1.2x avg volume is enough
  adx_trending: 18         # lowered: catch weaker trends too
  # Weights
  weight_move: 1
  weight_vwap: 1
  weight_candle: 1
  weight_rsi: 1
  weight_volume: 2         # highest confirmation value
  weight_supertrend: 2     # strongest trend filter
  weight_macd: 0.5         # laggy on intraday, reduced
  weight_bollinger: 1
  weight_adx: 1
  weight_orb: 1            # only if vol > 2× 5-day avg
  premarket_momentum_bonus: 0.5

# ── Indicators ──
indicators:
  rsi_period: 14
  ema_fast: 9
  ema_slow: 21
  atr_period: 14
  supertrend_period: 10
  supertrend_multiplier: 3.0
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bollinger_period: 20
  bollinger_std: 2.0
  adx_period: 14
  adx_orb_min: 18          # lowered — 1m ADX takes ~28 bars to stabilise, 22 was blocking prime ORB window
  adx_orb_strong: 28
  adx_reversal_max: 20     # tighter: only trade reversals in genuinely weak-trend zones
  adx_reversal_partial: 24

# ── ATR-based SL/Target ──
risk_management:
  sl_atr_multiplier: 1.5        # wider SL = fewer false exits (was 1.2)
  target_atr_multiplier: 2.5    # target = 2.5× ATR → R:R of 1:1.67 (was 2.0)
  fixed_target_pct: 0           # disabled — use ATR-based target (1.0% was causing negative R:R on high-ATR stocks)
  true_edge_min_pct: 0.05       # large-cap edge threshold (after slippage)
  true_edge_min_midcap: 0.08    # mid-cap edge threshold (after slippage)
  trailing_breakeven_pct: 0.5
  trailing_lock_1_pct: 0.75
  trailing_lock_2_pct: 1.0
  trailing_stop_activation_atr: 1.0
  trailing_stop_trail_atr: 1.0
  partial_exit_atr: 1.5
  partial_exit_pct: 40
  zombie_exit_minutes: 90
  zombie_atr_band: 0.3
  breakeven_activation_atr: 1.0
  strategy_disable_min_trades: 8
  strategy_disable_wr_floor: 35

# ── Circuit Breaker ──
circuit_breaker:
  daily_loss_limit_pct: -3.0
  daily_gain_lock_pct: 6.0
  drawdown_from_peak_pct: 2.5

# ── Loss Streak ──
loss_streak:
  max_consecutive: 2   # halt after 2 consecutive losses (was 3) — protect capital faster

# ── Slippage Model ──
slippage:
  large_cap_pct: 0.05      # Nifty50
  mid_cap_pct: 0.10        # was 0.15 — too punishing, blocks most mid-caps
  small_cap_pct: 0.25
  min_true_edge_pct: 0.05  # signal must exceed this after costs

# ── Market Regime ──
regime:
  strong_trend_adx: 26      # was 30 — 1m ADX rarely hits 30 except explosive moves
  weak_trend_adx_min: 20
  weak_trend_adx_max: 26
  range_adx: 20
  vwap_strong_dist_pct: 0.5
  vwap_range_dist_pct: 0.3
  bb_strong_bw: 2.0
  bb_weak_bw_min: 1.0
  bb_weak_bw_max: 2.0
  bb_range_bw: 1.0
  min_confidence: 30        # main session threshold
  min_confidence_warmup: 25 # relaxed threshold: first ~24min (ADX=None early → conf=30)
  warmup_until: "09:44"     # ADX(14) on 1m stabilises at bar 28 = market open 9:15 + 28min

# ── Liquidity Sweep ──
liquidity:
  wick_atr_threshold: 0.4
  sweep_volume_ratio: 1.5
  re_entry_wait_candles: 2

# ── Correlation Guard ──
correlation:
  max_correlation: 0.85
  lookback_days: 5

# ── News Filter ──
news:
  enabled: true
  cache_ttl_minutes: 15
  block_on_failure: false  # don't block trades just because RSS feed timed out
  news_gate_enabled: true  # set false to log news status without blocking signals

# ── Telegram ──
telegram:
  enabled: true
  bot_token: "YOUR_BOT_TOKEN_HERE"   # local only; in the cloud use GitHub Secret TELEGRAM_BOT_TOKEN
  chat_id: "YOUR_CHAT_ID_HERE"       # local only; in the cloud use GitHub Secret TELEGRAM_CHAT_ID
  throttle_seconds: 60

# ── Dynamic Watchlist ──
dynamic_watchlist:
  expansion_enabled: true     # at 11 AM, inject overflow (ranks 26-35) if < 3 trades fired
  expansion_min_trades: 3     # expand only when session has fewer than this many signals
  expansion_slots: 10         # how many overflow candidates to inject (positions 26-35)
  midday_rescreen: true       # at 12 PM, run lightweight volume+momentum rescreen
  midday_max_inject: 10       # max new symbols to add from midday rescreen
  primary_watchlist_size: 25  # top N from screener used as primary (rest = overflow)

# ── Parallel Fetch ──
parallel_fetch:
  max_workers: 8              # ThreadPoolExecutor workers for symbol data fetch
  rate_limit_sec: 0.5         # per-thread sleep before yfinance call (throttle guard)

# ── Backtesting ──
backtest:
  default_days: 90
  min_sharpe: 1.0
  max_drawdown_pct: 8.0
